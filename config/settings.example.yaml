# JLR Technology Intelligence Assistant — Example configuration
# Copy to settings.yaml and set your own values. Never commit settings.yaml (it is in .gitignore).

# Paths (relative to project root)
paths:
  # PDFs to ingest — default is data/raw_pdfs (not project-root "raw_pdfs" unless you set it here)
  raw_pdfs: "data/raw_pdfs"
  processed_chunks: "data/processed_chunks"
  index_dir: "index"
  scopus_export_csv: null   # optional: path to Scopus export CSV for enriching chunks

# Chunking
chunking:
  token_target_min: 500
  token_target_max: 800
  overlap_tokens: 100
  max_overlap_tokens: 150

# Embedding (one chunk per request is slower but more reliable for slow APIs)
embedding:
  model: "text-embedding-3-small"
  dimensions: 1536
  batch_size: 1
  max_chunks_per_run: 500
  timeout_seconds: 300
  max_chunk_chars: 20000
  # false = do not blacklist a whole PDF when one chunk is too long (recommended).
  skip_abnormal_sources: false
  # truncate = embed first max_chunk_chars; skip = drop only oversized chunks.
  on_oversized_chunk: truncate

# Retrieval (max_chunks_per_source: 2 encourages multiple papers in each answer)
retrieval:
  top_k: 12
  max_chunks_per_source: 2
  min_similarity_threshold: 0.0

# LLM (synthesis) — set api_key and base_url in settings.yaml or use env OPENAI_API_KEY / OPENAI_BASE_URL
llm:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 2048
  base_url: null
  api_key: null

# Adaptive RAG (dynamic sections + evidence confidence)
adaptive_rag:
  use_intent_classification: true   # choose content blocks from query intent
  min_confidence: 0.25              # if retrieval score below this, use only summary + key_findings + sources

# Deep research (multi-agent pipeline) — longer reports
deep_research:
  report_max_tokens: 8192           # max tokens for the final report (default 8192; increase for longer reports)
  extraction_max_tokens: 4096       # max tokens for evidence extraction JSON (default 4096)
  max_evidence_chars: 20000         # max evidence text sent to report agent (default 20000)

# Reddit insights (/api/reddit-insights): index/reddit_index.json is gitignored (large).
# Build: npm run embed:reddit  →  then either keep file local or upload JSON and set:
# reddit_index_url: "https://your-cdn/.../reddit_index.json"
# Env override: REDDIT_INDEX_URL
# Private Vercel Blob: also set BLOB_READ_WRITE_TOKEN (from Vercel → Storage) for server-side fetch.
reddit_index_url: null

# System identity for prompts
system_identity: "Technology Strategy Analyst for JLR specializing in emerging AEC design technologies."

lifecycle_stages:
  - "Emerging"
  - "Growth"
  - "Mature"
  - "Decline"
